name: Daily Update

on:
  schedule:
    # Run once per day at 15:25 UTC
    - cron: "25 15 * * *"

  workflow_dispatch:  # manual runs still work

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update daily-status.md (24f2006754@ds.study.iitm.ac.in)
        run: |
          mkdir -p logs
          echo "---" >> daily-status.md
          echo "Update on $(date -u)" >> daily-status.md
          echo "Triggered by 24f2006754@ds.study.iitm.ac.in" >> daily-status.md
          echo "---" >> daily-status.md

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add daily-status.md
          git commit -m "Daily update - $(date -u)" || exit 0
          git push
